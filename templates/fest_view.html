<!DOCTYPE html>
<html>
<head>
    <title>Fests</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <span class="logo">🎓 EventSphere</span>
</div>

<h2>Select Fest</h2>

<div class="dashboard-cards">
    {% for fest in fests %}
        <div class="card">
            <a href="/events?fest={{ fest[0] }}">{{ fest[0] }}</a>
        </div>
    {% endfor %}
</div>

<footer class="footer">
    <div class="footer-container">

        <div class="footer-left">
            <h3>🎓 EventSphere</h3>
            <p>Manage college fests, participants, and results efficiently.</p>
        </div>

        <div class="footer-center">
            <a href="/events">Events</a>
            <a href="/participants">Participants</a>
            <a href="/results">Results</a>
            <a href="/analytics">Analytics</a>
        </div>

        <div class="footer-right">
            <p>© 2026 EventSphere</p>
            <small>Built for college management</small>
        </div>

    </div>
</footer>

</body>
</html>
