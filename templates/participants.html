<!DOCTYPE html>
<html>
<head>
    <title>Participants</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/events">View Events</a>
    <a href="/participants">Participants</a>
    <a href="/participant">Add Participant</a>
    <a href="/analytics">Analytics</a>
</div>

<h2>All Participants</h2>

<table border="1" cellpadding="10" cellspacing="0">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Roll No</th>
        <th>Department</th>
        <th>Year</th>
        <th>Type</th>
        <th>Action</th>
    </tr>

    {% for p in participants %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
        <td>{{ p[3] }}</td>
        <td>{{ p[4] }}</td>
        <td>{{ p[5] }}</td>
        <td>
            <a href="/edit_participant/{{ p[0] }}">Edit</a> |
            <a href="/delete_participant/{{ p[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
