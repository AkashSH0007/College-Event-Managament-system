<h2>Add Participant</h2>

<form action="/submit_participant" method="POST">

    <label>Participant Name:</label><br>
    <input type="text" name="participant_name"><br><br>

    <label>Roll No:</label><br>
    <input type="text" name="roll_no"><br><br>

    <label>Department:</label><br>
    <input type="text" name="department"><br><br>

    <label>Year of Study:</label><br>
    <input type="number" name="year_of_study"><br><br>

    <label>Participant Type:</label><br>
    <input type="text" name="participant_type"><br><br>

    <button type="submit">Submit</button>

</form>

</body>
